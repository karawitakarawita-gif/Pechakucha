<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pecha Kucha - Evolución del Equipo</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Nunito:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fdfbf7; /* Color papel */
            background-image: radial-gradient(#d3cfc8 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Nunito', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #2c3e50;
        }
        #progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 8px;
            background-color: #e74c3c;
            width: 0%;
            transition: width 20s linear; /* Temporizador de 20 segundos */
            z-index: 10;
        }
        .slide {
            display: none;
            width: 90%;
            max-width: 1100px;
            height: 80vh;
            background: #fff;
            padding: 30px 40px;
            /* Efecto de dibujo a mano en el borde */
            border: 4px solid #2c3e50;
            border-radius: 2% 95% 4% 92% / 95% 4% 92% 5%;
            box-shadow: 8px 8px 0px rgba(44, 62, 80, 0.2);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }
        .slide.active {
            display: flex;
            animation: fadeIn 0.5s ease-in-out;
        }
        .slide h1 {
            font-family: 'Caveat', cursive;
            font-size: 2.6rem;
            margin: 0 0 15px 0;
            transform: rotate(-1deg);
            line-height: 1.1;
        }
        .slide-body {
            display: flex;
            width: 100%;
            flex: 1;
            gap: 25px;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .slide-body.no-images .script-box {
            max-width: 700px;
        }
        .images-col {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 0 0 38%;
            max-width: 38%;
            height: 100%;
            justify-content: center;
            align-items: center;
        }
        .images-col.count-1 img, .placeholder-box.count-1 {
            max-height: 90%;
        }
        .images-col img {
            width: 100%;
            max-height: 100%;
            object-fit: contain;
            border: 3px solid #2c3e50;
            border-radius: 10px;
            background: #fdfbf7;
            box-shadow: 4px 4px 0px rgba(44, 62, 80, 0.15);
        }
        .placeholder-box {
            width: 100%;
            flex: 1;
            min-height: 90px;
            border: 3px dashed #bdc3c7;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Caveat', cursive;
            font-size: 1.3rem;
            color: #95a5a6;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }
        .text-col {
            flex: 1;
            min-width: 0;
            height: 100%;
            display: flex;
            align-items: center;
        }
        .script-box {
            font-size: 1.05rem;
            line-height: 1.55;
            background: #f9f9f9;
            padding: 18px 22px;
            border: 2px dashed #bdc3c7;
            border-radius: 10px;
            text-align: justify;
            max-height: 100%;
            overflow: hidden;
        }
        .slide-number {
            position: absolute;
            bottom: 15px;
            right: 30px;
            font-family: 'Caveat', cursive;
            font-size: 2rem;
            font-weight: bold;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="progress-bar"></div>

    <!-- Las 20 Diapositivas -->
    <div id="slides-container"></div>

    <script>
        const guion = [
            "Empezamos este ciclo desde cero, con mucha incertidumbre y un gran reto por delante. Hoy les presentamos la evolución de nuestro equipo. Veremos cómo logramos organizarnos, superar los obstáculos de las primeras semanas y transformar el caos en un aprendizaje real.",
            "Semana 1: Nuestra historia comenzó frente a un Canvas en blanco. Cada uno aportó su visión y, a pesar de los obstáculos típicos de cualquier inicio, logramos definir quiénes éramos. Nació nuestra identidad institucional, plasmada visualmente en una línea de tiempo y en nuestros propios avatares académicos.",
            "Semana 2: Con la identidad clara, unimos fuerzas. Mientras unas mentes creativas trazaban bocetos, otras utilizaban Inteligencia Artificial para darles vida. El resultado fue una historieta que no solo representaba nuestros roles, sino que demostraba nuestro dominio de las nuevas herramientas digitales.",
            "Semana 3: Era el momento de darle voz a nuestro mensaje. Nos sumergimos en las ideas de Daniel Goleman sobre la Inteligencia Emocional y asumimos nuestros primeros roles frente a la cámara. Aplicando la Técnica Feynman, logramos traducir conceptos complejos en palabras sencillas y cercanas.",
            "Semana 4: Decidimos mirar hacia adentro. Usando nuestros avatares, creamos una radiografía animada de nuestra propia realidad estudiantil, mostrando un 'antes' dominado por el estrés y la desorganización, frente a un 'después' iluminado por la planificación consciente.",
            "Semana 5: Llegó nuestra prueba de fuego: la primera Evaluación Continua. Al no tener el guion completamente unificado, los nervios nos jugaron una mala pasada y opacaron la presentación. Sin embargo, en lugar de desanimarnos, nos sentamos a dialogar. Ese tropiezo se convirtió en nuestra lección de equipo más valiosa.",
            "Semana 6: Este fue nuestro verdadero punto de inflexión. Tomamos las riendas y fuimos estratégicos: decidimos exactamente quiénes tomarían la palabra y quiénes estructurarían el diseño y la redacción. Ensayamos con cronómetro en mano, moldeando nuestra presentación al estilo de una gran Charla TED para reevaluar y dominar nuestras emociones.",
            "Semana 7: El esfuerzo rindió frutos. Al salir a exponer bajo el formato TED, logramos sobrellevar los nervios y autorregular nuestras emociones para entregar una presentación excelente. Finalmente creamos un mapa visual de nuestro viaje emocional: lo que sentimos antes, durante y después del escenario.",
            "Semana 8: Con la confianza renovada, nos preparamos para la Evaluación Parcial. Esta vez, la Inteligencia Artificial fue nuestra aliada ética, retándonos con ejercicios prácticos para perfeccionar nuestro uso de las normas de citación APA 7.",
            "Semana 9: Ya no solo mirábamos nuestro trabajo, sino que aprendíamos del entorno. Observamos otras exposiciones, identificamos la Charla TED más organizada y extrajimos sus secretos de planificación. Plasmamos esas ideas en una ficha visual para inspirar nuestro propio estilo y desarrollo personal.",
            "Semana 10: El final de este viaje no era solo para nosotros, sino para compartirlo. Consolidamos todo lo aprendido y lanzamos la campaña de voluntariado 'El poder de tus pensamientos'. Entendimos que la ansiedad ante los exámenes era un enemigo común y decidimos pasar a la acción plasmando nuestras propuestas en un afiche.",
            "Semana 11: Dominamos la reevaluación cognitiva: el arte de pausar, analizar y actuar con consciencia. Llevamos esto al escenario perfeccionando nuestra propia Charla TED. Basados en Daniel Goleman, demostramos que la Inteligencia Emocional es nuestro verdadero motor.",
            "Conectamos este aprendizaje con los Objetivos de Desarrollo Sostenible. Aportamos al ODS 3 fortaleciendo nuestra salud mental, y al ODS 4 en educación, evitando tomar decisiones cegados por la ansiedad. Finalmente, ejecutamos la presentación y nuestra Charla TED fue un éxito rotundo.",
            "Semana 12: Afrontamos la Evaluación Continua 2 con el reto de sustentar nuestro dossier en formato Charla TED. Iniciamos estructurando las ideas clave y dividiendo la exposición. Redactamos un borrador inicial que luego perfeccionamos de forma iterativa con ayuda de la inteligencia artificial.",
            "Con el guion consolidado, pasamos a la fase de ensayo. Nos enfocamos rigurosamente en la ejecución práctica de la presentación: priorizamos el dominio de la expresión corporal, el uso de pausas estratégicas y las técnicas esenciales para lograr el impacto de una auténtica Charla TED.",
            "Semana 13: Desarrollamos nuestro Proyecto de Vida empleando un Elevator Pitch. Estructuramos el discurso en tres pilares clave: identidad, construcción personal y proyección profesional. El objetivo central fue definir con claridad quiénes somos y hacia dónde nos dirigimos en nuestra carrera.",
            "Explicamos el 'qué, cómo y para qué' de nuestra formación, enfocando nuestras metas en el campo de la ciberseguridad. Al proyectar nuestro futuro, logramos transmitir un sólido compromiso personal y profesional, demostrando la dedicación necesaria para construir nuestro camino al éxito.",
            "Semana 14: Reflexionamos sobre nuestro viaje. Como ilustra nuestra línea de tiempo, partimos de un verdadero 'caos inicial', frenados por la confusión. Sin embargo, superamos esta barrera organizándonos: estructuramos el trabajo e implementamos un ciclo constante de mejora continua.",
            "Con el trabajo estructurado, pasamos a la acción. Reconocimos las fortalezas de cada integrante y nos apoyamos en la investigación conjunta. Al dejar de lado la desorganización, unificamos nuestro compromiso bajo un objetivo común. ¡Logramos llegar a la meta!",
            "Durante este proceso enfrentamos diversos obstáculos, especialmente el caos inicial. Sin embargo, comprobamos que el trabajo en equipo fue el motor clave para superarlos. Al organizarnos, transformamos esa confusión en un aprendizaje fundamental para nuestro futuro profesional. ¡Muchas gracias por escucharnos!"
        ];

        const titulos = [
            "Del Caos al Aprendizaje",
            "Identidad institucional y sentido de pertenencia universitaria",
            "Liderazgo académico y organización del trabajo en equipo",
            "Estrategias de aprendizaje para el estudio universitario",
            "Hábitos de estudio y gestión del tiempo académico",
            "Semana 5: El Tropiezo",
            "Estrategias efectivas en la exposición académica",
            "Estrategias efectivas en la autorregulación emocional",
            "Semana 8: Evaluación y APA",
            "Objetivos de Desarrollo Sostenible aplicados al bien común",
            "Voluntariado académico como estrategia de compromiso social",
            "Ética y normas para el desarrollo académico",
            "Impacto ODS 3 y 4",
            "Semana 12: Dossier TED",
            "Fase de Ensayo Riguroso",
            "Emprendimiento e innovación personal y académico",
            "Innovación aplicada a la ciberseguridad",
            "Estrategias efectivas para impulsar el desarrollo personal y académico",
            "Acción, fortalezas y trabajo en equipo",
            "¡Gracias por escucharnos!"
        ];

        // Rutas de imagenes por diapositiva (relativas a la carpeta 'images').
        // Deja el arreglo vacío [] si aun no tienes imagen para esa diapositiva:
        // se mostrara una caja punteada donde luego puedes anadir la tuya.
        const imagenes = [
            ["images/inicio.png"],                                                              // 0 - Intro
            ["images/semana1_1.png", "images/semana1_2.png"],                                    // 1 - Semana 1
            ["images/semana2_1.png", "images/semana2_2.png"],                                    // 2 - Semana 2
            ["images/semana3_1.png", "images/semana3_2.png", "images/semana3_3.png"],             // 3 - Semana 3
            ["images/semana4_1.png", "images/semana4_2.png"],                                    // 4 - Semana 4
            ["images/semana5_1.png"],                                                             // 5 - Semana 5
            ["images/semana6_1.png", "images/semana6_2.jpeg"],                                    // 6 - Semana 6
            ["images/semana7_1.png", "images/semana7_2.png"],                                     // 7 - Semana 7
            ["images/semana8_1.png"],                                                             // 8 - Semana 8
            ["images/semana9_1.png", "images/semana9_2.png", "images/semana9_3.png"],             // 9 - Semana 9
            ["images/semana10_1.png", "images/semana10_2.png"],                                   // 10 - Semana 10
            ["images/semana11_1.png", "images/semana11_2.png"],                                   // 11 - Semana 11
            ["images/semana11_extra1.png", "images/semana11_extra2.png",
             "images/semana11_extra3.png", "images/semana11_extra4.png"],                        // 12 - Semana 11 (2)
            ["images/semana12_1.png", "images/semana12_2.png"],                                   // 13 - Semana 12
            ["images/semana12_extra1.png"],                                                       // 14 - Semana 12 (2)
            ["images/semana13_1.png", "images/semana13_2.png", "images/semana13_3.png"],          // 15 - Semana 13
            ["images/semana13_extra1.png", "images/semana13_extra2.png",
             "images/semana13_extra3.png"],                                                       // 16 - Semana 13 (2)
            ["images/semana14_1.png", "images/semana14_2.png"],                                   // 17 - Semana 14
            [],                                                                                    // 18 - Semana 14 (2) -> caja para tu imagen
            ["images/cierre.png"]                                                                  // 19 - Cierre
        ];

        const TOTAL_SLIDES = guion.length;
        const SEGUNDOS_POR_DIAPOSITIVA = 20;

        const container = document.getElementById('slides-container');
        let currentSlide = 0;
        let autoAdvanceTimeout;

        // Generar el HTML de las diapositivas
        for (let i = 0; i < TOTAL_SLIDES; i++) {
            const slideDiv = document.createElement('div');
            slideDiv.className = 'slide' + (i === 0 ? ' active' : '');
            slideDiv.id = 'slide-' + i;

            const imgs = imagenes[i] || [];
            let imagesHtml = '';
            if (imgs.length > 0) {
                imagesHtml = `<div class="images-col count-${imgs.length}">` +
                    imgs.map(src => `<img src="${src}" alt="Imagen semana" onerror="this.outerHTML='<div class=\\'placeholder-box\\'>Imagen no encontrada:<br>${src}</div>'">`).join('') +
                    `</div>`;
            } else {
                imagesHtml = `<div class="images-col count-1"><div class="placeholder-box">Aqui puedes anadir<br>tu imagen</div></div>`;
            }

            slideDiv.innerHTML = `
                <h1>${titulos[i]}</h1>
                <div class="slide-body">
                    ${imagesHtml}
                    <div class="text-col">
                        <div class="script-box"><strong>Tu guion:</strong><br><br>${guion[i]}</div>
                    </div>
                </div>
                <div class="slide-number">${i + 1} / ${TOTAL_SLIDES}</div>
            `;
            container.appendChild(slideDiv);
        }

        function resetProgressBar() {
            const bar = document.getElementById('progress-bar');
            bar.style.transition = 'none';
            bar.style.width = '0%';
            // forzar reflow para reiniciar la animacion
            void bar.offsetWidth;
            bar.style.transition = `width ${SEGUNDOS_POR_DIAPOSITIVA}s linear`;
            bar.style.width = '100%';
        }

        function goToSlide(index) {
            document.getElementById('slide-' + currentSlide).classList.remove('active');
            currentSlide = index;
            document.getElementById('slide-' + currentSlide).classList.add('active');
        }

        function nextSlide() {
            if (currentSlide < TOTAL_SLIDES - 1) {
                goToSlide(currentSlide + 1);
                resetProgressBar();
                scheduleNext();
            } else {
                // Ultima diapositiva: se detiene el avance automatico.
                const bar = document.getElementById('progress-bar');
                bar.style.transition = 'none';
                bar.style.width = '100%';
            }
        }

        function scheduleNext() {
            clearTimeout(autoAdvanceTimeout);
            autoAdvanceTimeout = setTimeout(nextSlide, SEGUNDOS_POR_DIAPOSITIVA * 1000);
        }

        // Iniciar la presentacion automatica
        resetProgressBar();
        scheduleNext();
    </script>
</body>
</html>
